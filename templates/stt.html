{% extends "base.html" %}

{% block title %}AAC Communication System | Speech to Text{% endblock %}

{% block body_class %}user-theme{% endblock %}

{% block content %}
<main class="aac-main">
    <section class="large-card-section">
        <div class="large-emoji">🎤</div>
        <h1 style="font-size:1.8rem; font-weight:900; color:var(--text); margin-bottom:20px;">Speech to Text</h1>
        <button class="btn btn-secondary btn-block" id="micBtn" onclick="startRecognition()" style="margin-bottom:20px; font-size:1.1rem;">🎤 Start Speaking</button>  
        <div class="form-group">
            <label for="speechText" style="display:block; margin-bottom:8px; font-weight:700;">Recognized Text:</label>
            <input type="text" id="speechText" class="large-textarea" style="resize:none; min-height:auto;" placeholder="Speech will appear here..." readonly>
        </div>
        <div style="margin-top:1.5rem; display:flex; gap:1rem; justify-content:center;">
            <button class="btn btn-primary" onclick="speakRecognizedText()">🔊 Speak Text</button>
            <button class="btn btn-secondary" onclick="document.getElementById('speechText').value = ''">Clear</button>
        </div>
    </section>
</main>
{% endblock %}
