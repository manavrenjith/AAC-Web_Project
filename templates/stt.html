{% extends "base.html" %}

{% block title %}AAC Communication System | Speech to Text{% endblock %}

{% block body_class %}user-theme{% endblock %}

{% block content %}
<main class="aac-main">
    <div class="user-header">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h2>Speech to Text (Malayalam)</h2>
            <a href="{{ url_for('user_home') }}" class="btn btn-clear hover-bounce">🏠 ഹോം (Home)</a>
        </div>
    </div>

    <!-- Speech to Text Section -->
    <section class="features-section stt-section" id="stt-malayalam" style="margin-top: 3rem;">
        <div class="stt-card">
            <button class="btn btn-mic" id="micBtn" onclick="startRecognition()">🎤 Start Speaking</button>
            
            <div class="tts-input-group">
                <label for="speechText">Recognized Text:</label>
                <input type="text" id="speechText" class="form-control" placeholder="Speech will appear here..." readonly>
            </div>
            
            <div class="tts-buttons" style="margin-top: 1.5rem; display: flex; gap: 1rem; justify-content: center;">
                <button class="btn btn-speak" onclick="speakRecognizedText()">🔊 Speak Text</button>
                <button class="btn btn-clear" onclick="clearRecognizedText()">Clear</button>
            </div>
        </div>
    </section>
</main>
{% endblock %}
